name: Decision history snapshot

on:
  schedule:
    # Lunes 09:00 UTC — la vela semanal cierra el lunes 00:00 UTC, así el snapshot
    # recoge el cierre fresco de la semana. Una entrada por semana (dedup por fecha).
    - cron: "0 9 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write   # para commitear data/decision_history.json

concurrency:
  group: btc-decision-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Calcular y guardar el snapshot de decisión
        run: python alerts/decision_snapshot.py
      - name: Guardar histórico
        run: |
          git config user.name "btc-decision-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/decision_history.json
          git diff --cached --quiet || git commit -m "decision snapshot [skip ci]"
          git push
